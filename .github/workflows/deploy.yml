name: Deploy to GitHub Pages

# Run on every push to main, and allow manual runs from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

# Minimal permissions needed to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only keep one deploy in flight at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is already static HTML/CSS/JS at the repo root,
          # so just upload the whole repo.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
